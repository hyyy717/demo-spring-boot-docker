<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý Thể Loại Sách</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <style>
    body { background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; min-height: 100vh; position: relative;}
    body::before { content: ""; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: -1; }
    .admin-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.6); }
    .table-custom { background: white; border-radius: 12px; overflow: hidden; }
    .table thead { background: linear-gradient(135deg, #d97706, #b45309); color: white; }
  </style>
</head>
<body>

<div class="container mt-5 mb-5" style="max-width: 800px;">
  <div class="card admin-card p-4 p-md-5">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
      <h3 class="fw-bold" style="color: #b45309;"><i class="bi bi-tags-fill"></i> QUẢN LÝ THỂ LOẠI</h3>
      <a href="/home" class="btn btn-outline-secondary fw-bold rounded-pill"><i class="bi bi-house"></i> Trở về</a>
    </div>

    <form id="editForm" th:action="@{/admin/categories/edit}" method="post" style="display: none;">
      <input type="hidden" name="id" id="editId">
      <input type="hidden" name="name" id="editName">
    </form>

    <form th:action="@{/admin/categories/add}" method="post" class="mb-5 d-flex gap-2">
      <input type="text" name="name" class="form-control form-control-lg" placeholder="Nhập tên thể loại mới..." required>
      <button type="submit" class="btn btn-lg fw-bold text-white" style="background: #d97706; white-space: nowrap;"><i class="bi bi-plus-circle"></i> Thêm Mới</button>
    </form>

    <div class="table-responsive table-custom">
      <table class="table table-hover align-middle mb-0">
        <thead>
        <tr>
          <th width="10%">STT</th>
          <th width="50%">Tên Thể Loại</th>
          <th width="40%" class="text-center">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat, iterStat : ${categories}">
          <td class="fw-bold text-muted" th:text="${iterStat.index + 1}">1</td>
          <td class="fw-bold fs-5" th:text="${cat.name}">Tên</td>
          <td class="text-center">
            <div class="d-flex justify-content-center gap-2">

              <button type="button" class="btn btn-sm btn-outline-primary rounded-pill fw-bold"
                      th:data-id="${cat.id}"
                      th:data-name="${cat.name}"
                      onclick="editCategory(this.getAttribute('data-id'), this.getAttribute('data-name'))">
                <i class="bi bi-pencil-square"></i> Sửa
              </button>

              <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}"
                 class="btn btn-sm btn-outline-danger rounded-pill fw-bold"
                 onclick="return confirm('Xóa thể loại này?');">
                <i class="bi bi-trash"></i> Xóa
              </a>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(categories)}">
          <td colspan="3" class="text-center py-4 text-muted">Chưa có thể loại nào. Hãy thêm mới!</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  function editCategory(id, currentName) {
    let newName = prompt("Nhập tên thể loại mới:", currentName);
    if (newName && newName.trim() !== "" && newName !== currentName) {
      // TRUYỀN DỮ LIỆU VÀO FORM ẨN VÀ SUBMIT (Không bị lỗi 403 nữa)
      document.getElementById('editId').value = id;
      document.getElementById('editName').value = newName.trim();
      document.getElementById('editForm').submit();
    }
  }
</script>
</body>
</html>
