<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng Của Bạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; min-height: 100vh; position: relative;}
        body::before { content: ""; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.6); padding: 30px; }
        .qty-btn { width: 32px; height: 32px; padding: 0; line-height: 30px; border-radius: 50%; font-weight: bold;}
    </style>
</head>
<body>
<div class="container mt-5" style="max-width: 900px;">
    <div class="glass-card">
        <h3 class="fw-bold mb-4" style="color: #b45309;"><i class="bi bi-cart-check-fill"></i> GIỎ HÀNG CỦA BẠN</h3>

        <div th:if="${errorMsg}" class="alert alert-danger fw-bold shadow-sm" th:text="${errorMsg}"></div>

        <div class="table-responsive" th:if="${not #lists.isEmpty(cartItems)}">
            <table class="table align-middle text-center mb-0">
                <thead class="table-light">
                <tr>
                    <th class="text-start">Tên Sách</th>
                    <th>Đơn Giá</th>
                    <th>Số Lượng</th>
                    <th>Thành Tiền</th>
                    <th>Hành Động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td class="text-start fw-bold" th:text="${item.book.title}">Tên sách</td>
                    <td th:text="${#numbers.formatDecimal(item.book.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">Giá</td>

                    <td>
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <form th:action="@{/cart/update}" method="post" class="m-0">
                                <input type="hidden" name="id" th:value="${item.book.id}">
                                <input type="hidden" name="action" value="decrease">
                                <button type="submit" class="btn btn-outline-secondary qty-btn"><i class="bi bi-dash"></i></button>
                            </form>
                            <span class="fw-bold fs-5 px-1" th:text="${item.quantity}" style="color: #b45309;">1</span>
                            <form th:action="@{/cart/update}" method="post" class="m-0">
                                <input type="hidden" name="id" th:value="${item.book.id}">
                                <input type="hidden" name="action" value="increase">
                                <button type="submit" class="btn btn-outline-success qty-btn"><i class="bi bi-plus"></i></button>
                            </form>
                        </div>
                    </td>

                    <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(item.book.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>

                    <td>
                        <form th:action="@{/cart/remove}" method="post" class="m-0" onsubmit="return confirm('Xóa sách này khỏi giỏ hàng?');">
                            <input type="hidden" name="id" th:value="${item.book.id}">
                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill fw-bold"><i class="bi bi-trash"></i> Xóa</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-5">
            <img src="https://cdn-icons-png.flaticon.com/512/11329/11329060.png" width="120" class="mb-3 opacity-50">
            <h4 class="text-muted fw-bold">Giỏ hàng đang trống!</h4>
        </div>

        <div th:if="${not #lists.isEmpty(cartItems)}" class="d-flex justify-content-between align-items-center mt-4 border-top pt-4">
            <h4 class="fw-bold m-0">Tổng thanh toán: <span style="color: #d97706; font-size: 1.5rem;" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span></h4>
            <form th:action="@{/cart/checkout}" method="post">
                <button type="submit" class="btn btn-lg fw-bold text-white shadow-sm px-4" style="background: linear-gradient(135deg, #d97706, #b45309); border-radius: 15px;">Thanh toán ngay <i class="bi bi-arrow-right-circle ms-1"></i></button>
            </form>
        </div>
        <div class="mt-4"><a href="/home" class="btn btn-light fw-bold text-secondary shadow-sm rounded-pill"><i class="bi bi-arrow-left"></i> Trở về trang chủ</a></div>
    </div>
</div>
</body>
</html>
