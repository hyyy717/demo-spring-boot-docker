<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Của Tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <style>
        /* Đồng bộ hình nền với home.html */
        body {
            background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45); z-index: -1;
        }

        /* Form Kính mờ */
        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .form-control, .form-select {
            border-radius: 10px; padding: 10px 15px; border: 1px solid #ced4da; transition: 0.3s;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(217, 119, 6, 0.25); border-color: #d97706;
        }

        /* Nút bấm đồng bộ */
        .btn-save {
            background: linear-gradient(135deg, #d97706, #b45309);
            color: white; border: none; border-radius: 12px; font-weight: bold; padding: 12px; transition: 0.3s;
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(217, 119, 6, 0.4); color: white; }
        .btn-back {
            background: rgba(255,255,255,0.8); color: #334155; border: 1px solid #cbd5e1; border-radius: 12px; font-weight: bold; padding: 12px; transition: 0.3s;
        }
        .btn-back:hover { background: #e2e8f0; transform: translateY(-3px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom w-100">
    <div class="container">
        <a class="navbar-brand" href="/home"><i class="bi bi-book-half me-1"></i> BOOKSTORE</a>
    </div>
</nav>

<div class="container mt-5 mb-5 d-flex justify-content-center flex-grow-1 align-items-center">
    <div class="card profile-card p-4 p-md-5 w-100" style="max-width: 650px;">
        <div class="text-center mb-4">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="90" class="mb-3">
            <h3 class="fw-bold" style="color: #d97706;">HỒ SƠ CÁ NHÂN</h3>
            <p class="text-muted">Quản lý thông tin để việc giao nhận sách thuận tiện nhất</p>
        </div>

        <div th:if="${param.success}" class="alert alert-success text-center fw-bold shadow-sm">
            <i class="bi bi-check-circle-fill"></i> Cập nhật thông tin thành công!
        </div>

        <form th:action="@{/profile/update}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold text-muted">Tài khoản (Email)</label>
                <input type="email" th:field="*{username}" class="form-control" style="background-color: #f1f5f9; cursor: not-allowed; color: #64748b;" readonly>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Họ và Tên</label>
                    <input type="text" th:field="*{fullName}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Số điện thoại</label>
                    <input type="tel" th:field="*{phone}" class="form-control" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Ngày sinh</label>
                    <input type="date" th:field="*{dateOfBirth}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Giới tính</label>
                    <select th:field="*{gender}" class="form-select" required>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Địa chỉ giao hàng mặc định</label>
                <input type="text" th:field="*{address}" class="form-control" required>
            </div>

            <div class="d-flex gap-3 mt-4">
                <a href="/home" class="btn btn-back w-50 text-center text-decoration-none"><i class="bi bi-arrow-left"></i> Trở về</a>
                <button type="submit" class="btn btn-save w-50"><i class="bi bi-save"></i> Lưu thay đổi</button>
            </div>
        </form>
    </div>
</div>
<script>
    // Real-time tự động đá văng nếu bị khóa
    setInterval(function() {
        fetch('/api/check-status')
            .then(response => {
                if (response.redirected && response.url.includes('login')) {
                    window.location.href = response.url;
                }
                return response.text();
            })
            .then(status => {
                if (status === 'locked') {
                    window.location.href = '/login?locked'; // Đá ra login
                }
            }).catch(e => console.log(e));
    }, 2000);
</script>
</body>
</html>
