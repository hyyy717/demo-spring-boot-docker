<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"><style>body { background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=2000&auto=format&fit=crop') no-repeat center fixed; background-size: cover; font-family: 'Segoe UI'; min-height: 100vh;} body::before { content: ""; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: -1; } .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); padding: 30px; }</style></head>
<body>
<div class="container mt-5">
    <div class="glass-card">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h3 class="fw-bold" style="color: #b45309;"><i class="bi bi-clock-history"></i> LỊCH SỬ MUA HÀNG</h3>
            <a href="/home" class="btn btn-outline-secondary rounded-pill fw-bold">Trở về</a>
        </div>
        <div th:if="${successMsg}" class="alert alert-success fw-bold" th:text="${successMsg}"></div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light"><tr><th>Mã ĐH</th><th>Thời gian</th><th>Tổng tiền</th><th>Trạng thái</th><th>Sách đã mua</th></tr></thead>
                <tbody>
                <tr th:each="ord : ${orders}">
                    <td class="fw-bold" th:text="'#MDH' + ${ord.id}"></td>
                    <td th:text="${#temporals.format(ord.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(ord.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                    <td><span class="badge bg-success" th:text="${ord.status}"></span></td>
                    <td>
                        <ul class="mb-0 ps-3">
                            <li th:each="detail : ${ord.orderDetails}" th:text="${detail.book.title} + ' (x' + ${detail.quantity} + ')'"></li>
                        </ul>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body></html>
