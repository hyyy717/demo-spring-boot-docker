<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hóa Đơn Thanh Toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=2000&auto=format&fit=crop') no-repeat center fixed; background-size: cover; font-family: 'Segoe UI', sans-serif; min-height: 100vh;}
        body::before { content: ""; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.6); z-index: -1; }
        .receipt-card { background: white; border-radius: 12px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-top: 10px solid #10b981; position: relative;}
        .receipt-card::after { content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 10px; background: radial-gradient(circle, transparent, transparent 50%, white 50%, white); background-size: 20px 20px; }
        .circle-check { width: 80px; height: 80px; background: #10b981; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: -80px auto 20px auto; border: 5px solid white; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);}
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container" style="max-width: 600px; margin-top: 60px;">
    <div class="receipt-card">
        <div class="circle-check"><i class="bi bi-check-lg"></i></div>

        <h2 class="text-center fw-bold mb-1" style="color: #10b981;">THANH TOÁN THÀNH CÔNG</h2>
        <p class="text-center text-muted fw-bold mb-4">Cảm ơn bạn đã mua sắm tại BOOKSTORE!</p>

        <div class="border-top border-bottom py-3 mb-4 text-center" style="background: #f8fafc; border-radius: 8px;">
            <p class="mb-1 text-muted small text-uppercase fw-bold">Tổng Thanh Toán</p>
            <h1 class="fw-bold mb-0" style="color: #b45309;" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></h1>
        </div>

        <div class="row mb-3">
            <div class="col-6 text-muted fw-bold">Mã Hóa Đơn:</div>
            <div class="col-6 text-end fw-bold" th:text="'#MDH' + ${order.id}"></div>
        </div>
        <div class="row mb-3">
            <div class="col-5 text-muted fw-bold">Ngày Mua:</div>
            <div class="col-7 text-end fw-bold" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm:ss')}"></div>
        </div>
        <div class="row mb-4">
            <div class="col-5 text-muted fw-bold">Khách Hàng:</div>
            <div class="col-7 text-end fw-bold" th:text="${order.user.fullName != null ? order.user.fullName : order.user.username}"></div>
        </div>

        <h6 class="fw-bold text-uppercase border-bottom pb-2 mb-3">Chi tiết sản phẩm</h6>
        <div th:each="detail : ${order.orderDetails}" class="d-flex justify-content-between mb-2 pb-2 border-bottom border-light">
            <div class="text-truncate pe-3 fw-bold" style="max-width: 70%;">
                <span th:text="${detail.quantity} + 'x '"></span> <span th:text="${detail.book.title}"></span>
            </div>
            <div class="fw-bold text-secondary" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
        </div>

        <div class="mt-5 d-flex gap-3">
            <a href="/history" class="btn btn-outline-secondary w-50 fw-bold py-3" style="border-radius: 12px;"><i class="bi bi-clock-history"></i> Xem lịch sử</a>
            <a href="/home" class="btn w-50 fw-bold text-white py-3 shadow-sm" style="background: #d97706; border-radius: 12px;"><i class="bi bi-cart"></i> Tiếp tục mua sắm</a>
        </div>
    </div>
</div>

</body>
</html>
